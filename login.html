<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Neon Cup 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">NEON CUP</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>System Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn" id="loginBtn">Login</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 Neon Cup Esports | All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Prevent page refresh

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            // Change button text while processing
            btn.innerText = "Authenticating...";

            try {
                // FIXED: Added /login to the end of your backend URL
                const API_URL = "https://neon-cup-backend.onrender.com/login"; 
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                const result = await response.json();

                // If the backend returns a successful response
                if (response.ok && result.message.includes("Successful")) {
                    
                    // 1. Save user info to localStorage
                    localStorage.setItem("userEmail", result.user.email);
                    localStorage.setItem("userName", result.user.username);
                    localStorage.setItem("userRole", result.user.role);

                    // 2. The Magic Redirect
                    if (result.user.role === "admin") {
                        alert("Welcome back, Commander. Accessing Admin Panel.");
                        window.location.href = "admin.html"; 
                    } else {
                        alert("Login successful! Entering the lobby...");
                        window.location.href = "dashboard.html"; 
                    }
                } else {
                    // Login failed (wrong password/email)
                    alert("Access Denied: " + (result.detail || "Invalid credentials"));
                    btn.innerText = "Login"; // Reset button
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Critical Error: Failed to connect to the server. Please check your backend.");
                btn.innerText = "Login"; // Reset button
            }
        });
    </script>
</body>
</html>
